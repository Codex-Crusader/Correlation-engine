# Metric pool and analysis settings.
#
# Pool model: fixed core with gated additions. Metrics are only ever added
# or removed via commits to this file, so the pool's full history is in git.
# Every metric carries a date_added; it does not enter the analysis until
# eligibility_days have passed, so today's news can never pick today's
# metrics. That gate is the defence against selection bias.
#
# Keep the pool around 30 to 50 series. Every metric added multiplies the
# number of hypothesis tests, and the honesty panel will show it.

settings:
  pool_founded: "2026-07-13"    # metrics added on/before this date were chosen
                                # blind, before any results existed: no gate
  history_start: "2024-07-01"   # first run backfills from here
  refetch_days: 14              # re-request this many trailing days each run
  eligibility_days: 60          # new metrics wait this long before analysis
  max_lag_days: 7               # lags tested: -7 .. +7
  min_overlap: 120              # minimum overlapping observations per test
  fdr_q: 0.05                   # Benjamini-Hochberg threshold
  min_abs_rho: 0.20             # effect-size floor: tiny-but-significant is noise
  stability_window: 14          # look at the last N runs that happened
  stability_min: 10             # edge must appear (same sign) in at least N of them
  placebo_reps: 20              # surrogate universes per day

metrics:
  # ---- Federal Register: what the government announces -------------------
  - id: fr_executive_orders
    source: federal_register
    label: Executive orders / day
    date_added: 2026-07-13
    params: { subtype: executive_order }
  - id: fr_proclamations
    source: federal_register
    label: Proclamations / day
    date_added: 2026-07-13
    params: { subtype: proclamation }
  - id: fr_memoranda
    source: federal_register
    label: Presidential memoranda / day
    date_added: 2026-07-13
    params: { subtype: memorandum }

  # ---- GDELT: what the world's news covers (share of all coverage) -------
  - id: news_tariffs
    source: gdelt
    label: "News: tariffs"
    date_added: 2026-07-13
    params: { query: "tariff OR tariffs" }
  - id: news_protest
    source: gdelt
    label: "News: protests"
    date_added: 2026-07-13
    params: { query: "protest OR protests" }
  - id: news_immigration
    source: gdelt
    label: "News: immigration"
    date_added: 2026-07-13
    params: { query: "immigration" }
  - id: news_interest_rates
    source: gdelt
    label: "News: interest rates"
    date_added: 2026-07-13
    params: { query: "\"interest rate\" OR \"interest rates\"" }
  - id: news_sanctions
    source: gdelt
    label: "News: sanctions"
    date_added: 2026-07-13
    params: { query: "sanctions" }
  - id: news_ai
    source: gdelt
    label: "News: artificial intelligence"
    date_added: 2026-07-13
    params: { query: "\"artificial intelligence\"" }
  - id: news_disasters
    source: gdelt
    label: "News: natural disasters"
    date_added: 2026-07-13
    params: { query: "hurricane OR wildfire OR earthquake OR flood" }
  - id: news_outbreak
    source: gdelt
    label: "News: outbreaks"
    date_added: 2026-07-13
    params: { query: "outbreak OR epidemic" }
  - id: news_ceasefire
    source: gdelt
    label: "News: ceasefire"
    date_added: 2026-07-13
    params: { query: "ceasefire" }
  - id: news_layoffs
    source: gdelt
    label: "News: layoffs"
    date_added: 2026-07-13
    params: { query: "layoffs OR \"job cuts\"" }

  # ---- FRED: daily economic indicators (needs FRED_API_KEY secret) -------
  - id: econ_10y_yield
    source: fred
    label: 10-year Treasury yield
    date_added: 2026-07-13
    params: { series_id: DGS10 }
  - id: econ_yield_spread
    source: fred
    label: 10y-2y yield spread
    date_added: 2026-07-13
    params: { series_id: T10Y2Y }
  - id: econ_vix
    source: fred
    label: VIX volatility index
    date_added: 2026-07-13
    params: { series_id: VIXCLS }
  # expected_lag_days: how far behind this series normally runs at the
  # source (H.10 exchange rates are released weekly; EIA publishes WTI spot
  # about a week late). The health table flags a metric only when it falls
  # more than the usual 5 days behind THIS baseline, so routine publication
  # lag does not show as a permanent false alarm.
  - id: econ_usd_eur
    source: fred
    label: USD/EUR exchange rate
    date_added: 2026-07-13
    expected_lag_days: 7
    params: { series_id: DEXUSEU }
  - id: econ_wti_oil
    source: fred
    label: WTI crude oil price
    date_added: 2026-07-13
    expected_lag_days: 7
    params: { series_id: DCOILWTICO }
  - id: econ_dollar_index
    source: fred
    label: Broad dollar index
    date_added: 2026-07-13
    expected_lag_days: 7
    params: { series_id: DTWEXBGS }

  # ---- Wikipedia pageviews: what the public looks up ---------------------
  - id: attn_inflation
    source: wikipedia
    label: "Attention: Inflation"
    date_added: 2026-07-13
    params: { article: Inflation }
  - id: attn_recession
    source: wikipedia
    label: "Attention: Recession"
    date_added: 2026-07-13
    params: { article: Recession }
  - id: attn_tariff
    source: wikipedia
    label: "Attention: Tariff"
    date_added: 2026-07-13
    params: { article: Tariff }
  - id: attn_federal_reserve
    source: wikipedia
    label: "Attention: Federal Reserve"
    date_added: 2026-07-13
    params: { article: Federal_Reserve }
  - id: attn_executive_order
    source: wikipedia
    label: "Attention: Executive order"
    date_added: 2026-07-13
    params: { article: Executive_order }
  - id: attn_stock_market
    source: wikipedia
    label: "Attention: Stock market"
    date_added: 2026-07-13
    params: { article: Stock_market }
  - id: attn_unemployment
    source: wikipedia
    label: "Attention: Unemployment"
    date_added: 2026-07-13
    params: { article: Unemployment }
